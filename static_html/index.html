<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowBuddy - 电子宠物应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
            min-height: 100vh;
            background: #FFA500; /* 默认心情颜色 - 中性 */
            transition: background 0.8s ease;
            position: relative;
            overflow: hidden;
        }

        /* 背景特效 */
        .background-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); }
            50% { transform: translateY(-20px) translateX(10px) scale(1.1); }
        }

        /* 头部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 10;
            position: relative;
        }

        .nav-button {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
            padding: 5px;
            z-index: 10;
            position: relative;
        }

        .coins-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            z-index: 10;
            position: relative;
        }

        .coins-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-left: 5px;
        }

        /* 宠物区域 */
        .pet-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 5;
        }

        .pet-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .pet {
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 110px;
            background: rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            z-index: 5;
        }

        /* 光晕效果 */
        .pet::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .pet:hover::before {
            opacity: 1;
        }

        /* SVG 宠物样式 */
        .pet-svg {
            width: 180px;
            height: 180px;
            transition: all 0.3s ease;
        }

        /* 宠物动画 */
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        @keyframes blink {
            0%, 40%, 80%, 100% { transform: scaleY(1); }
            20%, 60% { transform: scaleY(0.1); }
        }

        @keyframes happyBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes sadWobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        @keyframes excitedJump {
            0%, 100% { transform: translateY(0); }
            25% { transform: translateY(-20px) scale(1.1); }
            50% { transform: translateY(0) scale(1.05); }
            75% { transform: translateY(-10px); }
        }

        .pet-animated {
            animation: breathe 4s ease-in-out infinite;
        }

        .eye-left, .eye-right {
            animation: blink 5s ease-in-out infinite;
        }

        .happy-animation {
            animation: happyBounce 1.5s ease-in-out infinite;
        }

        .sad-animation {
            animation: sadWobble 3s ease-in-out infinite;
        }

        .excited-animation {
            animation: excitedJump 0.8s ease-out;
        }

        .mood-indicator {
            background: rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            z-index: 5;
            position: relative;
        }

        .mood-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        /* 饱食度条 */
        .progress-container {
            display: flex;
            align-items: center;
            padding: 0 20px 20px;
            z-index: 5;
            position: relative;
        }

        .progress-label {
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 60px;
        }

        .progress-bar {
            flex: 1;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 10px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 50%; /* 示例饱食度 */
            background: #4ECDC4;
            border-radius: 10px;
            transition: width 0.5s ease, background-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            100% { left: 100%; }
        }

        .progress-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 40px;
            text-align: right;
        }

        /* 操作提示 */
        .instructions {
            text-align: center;
            padding: 0 20px 20px;
            z-index: 5;
            position: relative;
        }

        .instruction-text {
            color: white;
            font-size: 14px;
            opacity: 0.8;
        }

        /* 底部导航 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.1);
            z-index: 10;
            position: relative;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* 心情颜色类 */
        .happy { background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%); } /* 金色 - 开心 */
        .neutral { background: linear-gradient(135deg, #ffa500 0%, #ff7e00 100%); } /* 橙色 - 一般 */
        .sad { background: linear-gradient(135deg, #1e90ff 0%, #0066cc 100%); } /* 蓝色 - 难过 */

        /* 点击动画 */
        .pet-clicked {
            transform: scale(1.15);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.6);
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }
            
            .pet {
                width: 180px;
                height: 180px;
            }
            
            .pet-svg {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container neutral" id="mainContainer">
        <!-- 背景特效 -->
        <div class="background-effect" id="backgroundEffects"></div>
        
        <!-- 头部导航 -->
        <div class="header">
            <button class="nav-button" onclick="goToChat()">💬</button>
            <div class="coins-container">
                💰
                <span class="coins-text" id="coinsDisplay">50</span>
            </div>
            <button class="nav-button" onclick="goToShop()">🛒</button>
        </div>

        <!-- 宠物区域 -->
        <div class="pet-area">
            <div class="pet-container">
                <div class="pet pet-animated" id="petElement" onclick="petClick()">
                    <svg class="pet-svg" viewBox="0 0 200 200" id="petSvg">
                        <!-- 宠物身体 -->
                        <defs>
                            <radialGradient id="bodyGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                                <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
                                <stop offset="100%" stop-color="white" stop-opacity="0.6"/>
                            </radialGradient>
                            
                            <filter id="glow">
                                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                                <feMerge> 
                                    <feMergeNode in="coloredBlur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>
                        
                        <circle cx="100" cy="100" r="70" fill="url(#bodyGradient)" filter="url(#glow)" id="petBody"/>
                        
                        <!-- 宠物眼睛 -->
                        <g id="eyesGroup">
                            <circle class="eye-left" cx="70" cy="85" r="10" fill="#333" filter="url(#glow)" id="eyeLeft">
                                <animate attributeName="cy" values="85;85;84;85;85" dur="4s" repeatCount="indefinite"/>
                            </circle>
                            <circle class="eye-right" cx="130" cy="85" r="10" fill="#333" filter="url(#glow)" id="eyeRight">
                                <animate attributeName="cy" values="85;85;84;85;85" dur="4s" repeatCount="indefinite"/>
                            </circle>
                            
                            <!-- 眼睛高光 -->
                            <circle cx="73" cy="83" r="3" fill="white" opacity="0.8"/>
                            <circle cx="133" cy="83" r="3" fill="white" opacity="0.8"/>
                        </g>
                        
                        <!-- 宠物嘴巴 -->
                        <path d="M 80 120 Q 100 140 120 120" stroke="#333" stroke-width="4" fill="none" id="mouth" filter="url(#glow)">
                            <animate attributeName="d" values="M 80 120 Q 100 140 120 120; M 80 125 Q 100 135 120 125; M 80 120 Q 100 140 120 120" dur="5s" repeatCount="indefinite"/>
                        </path>
                        
                        <!-- 宠物耳朵 -->
                        <ellipse cx="50" cy="60" rx="15" ry="25" fill="url(#bodyGradient)" filter="url(#glow)" id="earLeft">
                            <animate attributeName="ry" values="25;27;25;24;25" dur="6s" repeatCount="indefinite"/>
                        </ellipse>
                        <ellipse cx="150" cy="60" rx="15" ry="25" fill="url(#bodyGradient)" filter="url(#glow)" id="earRight">
                            <animate attributeName="ry" values="25;27;25;24;25" dur="6s" repeatCount="indefinite"/>
                        </ellipse>
                        
                        <!-- 宠物尾巴 -->
                        <path d="M 165 110 Q 185 100 180 80" stroke="url(#bodyGradient)" stroke-width="10" fill="none" id="tail" filter="url(#glow)">
                            <animate attributeName="d" values="M 165 110 Q 185 100 180 80; M 165 115 Q 185 105 180 85; M 165 110 Q 185 100 180 80" dur="4s" repeatCount="indefinite"/>
                        </path>
                        
                        <!-- 宠物装饰 - 项链 -->
                        <ellipse cx="100" cy="130" rx="40" ry="8" fill="none" stroke="#FFD700" stroke-width="3" stroke-dasharray="5,5" id="collar">
                            <animate attributeName="stroke-dashoffset" values="0;-10" dur="2s" repeatCount="indefinite"/>
                        </ellipse>
                        
                        <!-- 宠物装饰 - 项圈铃铛 -->
                        <circle cx="100" cy="140" r="6" fill="#FFD700" id="bell">
                            <animate attributeName="cx" values="100;102;100;98;100" dur="3s" repeatCount="indefinite"/>
                        </circle>
                    </svg>
                </div>
                <div class="mood-indicator">
                    <span class="mood-text" id="moodText">一般</span>
                </div>
            </div>
        </div>

        <!-- 饱食度条 -->
        <div class="progress-container">
            <span class="progress-label">饱食度</span>
            <div class="progress-bar">
                <div class="progress-fill" id="hungerBar"></div>
            </div>
            <span class="progress-text" id="hungerPercent">50%</span>
        </div>

        <!-- 操作提示 -->
        <div class="instructions">
            <p class="instruction-text">点击宠物 +1金币 | 长按喂食</p>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>主页</span>
            </a>
            <a href="shop.html" class="nav-item">
                <span class="nav-icon">🛒</span>
                <span>商店</span>
            </a>
            <a href="chat.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span>对话</span>
            </a>
        </div>
    </div>

    <script>
        // 宠物数据
        let coins = 50;
        let hunger = 50; // 0-100
        let mood = 'neutral'; // happy, neutral, sad
        let isFeeding = false;
        let feedTimer = null;
        let particleId = 0;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            createBackgroundEffects();
            updateHungerDisplay();
            
            // 长按喂食功能
            const petElement = document.getElementById('petElement');
            
            petElement.addEventListener('mousedown', startFeeding);
            petElement.addEventListener('mouseup', stopFeeding);
            petElement.addEventListener('mouseleave', stopFeeding);
            
            // 触摸设备支持
            petElement.addEventListener('touchstart', function(e) {
                startFeeding();
                e.preventDefault();
            });
            
            petElement.addEventListener('touchend', function(e) {
                stopFeeding();
                e.preventDefault();
            });
        });

        // 创建背景特效
        function createBackgroundEffects() {
            const container = document.getElementById('backgroundEffects');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                // 随机大小和位置
                const size = Math.random() * 30 + 10;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.top = Math.random() * 100 + '%';
                
                // 随机动画延迟
                bubble.style.animationDelay = Math.random() * 5 + 's';
                
                container.appendChild(bubble);
            }
        }

        // 更新饱食度显示
        function updateHungerDisplay() {
            const hungerBar = document.getElementById('hungerBar');
            const hungerPercent = document.getElementById('hungerPercent');
            const moodText = document.getElementById('moodText');
            const mainContainer = document.getElementById('mainContainer');
            const petBody = document.getElementById('petBody');
            const mouth = document.getElementById('mouth');
            const tail = document.getElementById('tail');
            const earLeft = document.getElementById('earLeft');
            const earRight = document.getElementById('earRight');
            const collar = document.getElementById('collar');
            const bell = document.getElementById('bell');
            const eyesGroup = document.getElementById('eyesGroup');
            
            hungerBar.style.width = (100 - hunger) + '%';
            hungerPercent.textContent = (100 - hunger) + '%';
            
            // 根据饱食度更新心情
            if (hunger <= 30) {
                mood = 'happy';
                moodText.textContent = '开心';
                
                // 开心时的宠物外观
                petBody.setAttribute('fill', 'url(#bodyGradient)');
                mouth.setAttribute('d', 'M 80 130 Q 100 150 120 130'); // 笑脸
                tail.setAttribute('stroke', '#FFD700');
                earLeft.setAttribute('fill', 'url(#bodyGradient)');
                earRight.setAttribute('fill', 'url(#bodyGradient)');
                collar.setAttribute('stroke', '#FFD700');
                bell.setAttribute('fill', '#FFD700');
                
                // 添加动画类
                document.getElementById('petSvg').classList.add('happy-animation');
                document.getElementById('petSvg').classList.remove('sad-animation');
                
                // 眼睛更亮
                document.querySelectorAll('#eyeLeft, #eyeRight').forEach(eye => {
                    eye.setAttribute('fill', '#222');
                });
            } else if (hunger <= 70) {
                mood = 'neutral';
                moodText.textContent = '一般';
                
                // 一般时的宠物外观
                petBody.setAttribute('fill', 'url(#bodyGradient)');
                mouth.setAttribute('d', 'M 80 125 Q 100 135 120 125'); // 中性脸
                tail.setAttribute('stroke', 'white');
                earLeft.setAttribute('fill', 'url(#bodyGradient)');
                earRight.setAttribute('fill', 'url(#bodyGradient)');
                collar.setAttribute('stroke', '#FFD700');
                bell.setAttribute('fill', '#FFD700');
                
                // 移除动画类
                document.getElementById('petSvg').classList.remove('happy-animation', 'sad-animation');
                
                // 眼睛正常
                document.querySelectorAll('#eyeLeft, #eyeRight').forEach(eye => {
                    eye.setAttribute('fill', '#333');
                });
            } else {
                mood = 'sad';
                moodText.textContent = '难过';
                
                // 难过时的宠物外观
                petBody.setAttribute('fill', 'url(#bodyGradient)');
                mouth.setAttribute('d', 'M 80 120 Q 100 110 120 120'); // 哭脸
                tail.setAttribute('stroke', '#1E90FF');
                earLeft.setAttribute('fill', 'url(#bodyGradient)');
                earRight.setAttribute('fill', 'url(#bodyGradient)');
                collar.setAttribute('stroke', '#1E90FF');
                bell.setAttribute('fill', '#1E90FF');
                
                // 添加动画类
                document.getElementById('petSvg').classList.add('sad-animation');
                document.getElementById('petSvg').classList.remove('happy-animation');
                
                // 眼睛暗淡
                document.querySelectorAll('#eyeLeft, #eyeRight').forEach(eye => {
                    eye.setAttribute('fill', '#555');
                });
            }
            
            // 更新背景颜色
            mainContainer.className = 'container ' + mood;
        }

        // 创建粒子效果
        function createParticles(x, y, color = '#FFD700') {
            for (let i = 0; i < 10; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.backgroundColor = color;
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.zIndex = '20';
                
                document.body.appendChild(particle);
                
                // 计算随机方向和距离
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 50 + 30;
                const duration = Math.random() * 1000 + 500;
                
                // 动画粒子
                const startTime = Date.now();
                const startLeft = x;
                const startTop = y;
                
                function animateParticle() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    if (progress < 1) {
                        const currentLeft = startLeft + Math.cos(angle) * distance * progress;
                        const currentTop = startTop + Math.sin(angle) * distance * progress;
                        
                        particle.style.left = currentLeft + 'px';
                        particle.style.top = currentTop + 'px';
                        particle.style.opacity = 1 - progress;
                        
                        requestAnimationFrame(animateParticle);
                    } else {
                        particle.remove();
                    }
                }
                
                animateParticle();
            }
        }

        // 宠物点击事件
        function petClick() {
            // 増加金币
            coins += 1;
            document.getElementById('coinsDisplay').textContent = coins;
            
            // 粒子效果
            const rect = document.getElementById('petElement').getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            createParticles(x, y, '#FFD700');
            
            // 简单的点击动画
            const petElement = document.getElementById('petElement');
            petElement.classList.add('pet-clicked');
            
            // 添加兴奋动画
            document.getElementById('petSvg').classList.add('excited-animation');
            
            setTimeout(() => {
                petElement.classList.remove('pet-clicked');
                document.getElementById('petSvg').classList.remove('excited-animation');
            }, 800);
            
            // 宠物表情变化
            const mouth = document.getElementById('mouth');
            const originalPath = mouth.getAttribute('d');
            mouth.setAttribute('d', 'M 80 135 Q 100 155 120 135'); // 瞬间开心
            setTimeout(() => {
                updateHungerDisplay(); // 恢复到正确的心情状态
            }, 300);
        }

        // 开始喂食
        function startFeeding() {
            feedTimer = setTimeout(function() {
                if (hunger > 0) {
                    hunger = Math.max(0, hunger - 20);
                    updateHungerDisplay();
                    
                    // 粒子效果
                    const rect = document.getElementById('petElement').getBoundingClientRect();
                    const x = rect.left + rect.width / 2;
                    const y = rect.top + rect.height / 2;
                    createParticles(x, y, '#4CAF50');
                    
                    alert('宠物吃饱了！');
                } else {
                    alert('宠物已经很饱了！');
                }
            }, 1000); // 1秒后喂食
        }

        // 停止喂食
        function stopFeeding() {
            if (feedTimer) {
                clearTimeout(feedTimer);
                feedTimer = null;
            }
        }

        // 导航功能
        function goToShop() {
            window.location.href = 'shop.html';
        }

        function goToChat() {
            window.location.href = 'chat.html';
        }
    </script>
</body>
</html>
