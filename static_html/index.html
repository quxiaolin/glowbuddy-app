<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowBuddy - 3D电子宠物应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); /* 默认开心颜色 - 金色 */
            transition: background 0.8s ease;
            position: relative;
            overflow: hidden;
        }

        /* 背景特效 */
        .background-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,215,0,0.3) 100%);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.7;
            }
            50% { 
                transform: translateY(-20px) translateX(10px) scale(1.1);
                opacity: 0.9;
            }
        }

        /* 头部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 10;
            position: relative;
        }

        .nav-button {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
            padding: 5px;
        }

        .coins-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .coins-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-left: 5px;
        }

        /* 宠物区域 */
        .pet-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 5;
        }

        .pet-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 3D 宠物容器 */
        .pet-3d-container {
            width: 250px;
            height: 300px;
            perspective: 1000px;
            margin-bottom: 20px;
            cursor: pointer;
            position: relative;
        }

        .pet-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }

        .pet-3d:hover {
            transform: rotateX(5deg) rotateY(5deg);
        }

        /* 宠物身体各部分 */
        .pet-part {
            position: absolute;
            backface-visibility: hidden;
        }

        /* 宠物身体主体 */
        .pet-body {
            width: 120px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FFA500, #FF8C00);
            border-radius: 50% 50% 40% 40%;
            top: 100px;
            left: 65px;
            box-shadow: 
                0 0 30px rgba(255, 215, 0, 0.6),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            animation: breathe3d 3s ease-in-out infinite;
        }

        /* 宠物头部 */
        .pet-head {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FFA500, #FF8C00);
            border-radius: 50%;
            top: 60px;
            left: 75px;
            box-shadow: 
                0 0 25px rgba(255, 215, 0, 0.5),
                inset 0 0 25px rgba(255, 255, 255, 0.3);
            animation: headBob 4s ease-in-out infinite;
        }

        /* 宠物腿部 */
        .pet-leg {
            width: 20px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #FFA500, #FF8C00, #FF6B35);
            border-radius: 10px;
        }

        .leg-front-left {
            top: 180px;
            left: 70px;
            animation: legMove 2s ease-in-out infinite;
        }

        .leg-front-right {
            top: 180px;
            left: 120px;
            animation: legMove 2s ease-in-out infinite 0.5s;
        }

        .leg-back-left {
            top: 180px;
            left: 140px;
            animation: legMove 2s ease-in-out infinite 0.25s;
        }

        .leg-back-right {
            top: 180px;
            left: 90px;
            animation: legMove 2s ease-in-out infinite 0.75s;
        }

        /* 宠物尾巴 */
        .pet-tail {
            width: 15px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FFA500, #FF8C00);
            border-radius: 10px 10px 5px 5px;
            top: 120px;
            left: 160px;
            transform-origin: top center;
            animation: tailWag 3s ease-in-out infinite;
        }

        /* 宠物耳朵 */
        .pet-ear {
            width: 25px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FF8C00);
            border-radius: 50%;
            transform-origin: bottom center;
        }

        .ear-left {
            top: 50px;
            left: 60px;
            transform: rotate(-30deg);
            animation: earMove 4s ease-in-out infinite;
        }

        .ear-right {
            top: 50px;
            left: 140px;
            transform: rotate(30deg);
            animation: earMove 4s ease-in-out infinite 0.5s;
        }

        /* 宠物面部特征 */
        .pet-face {
            position: absolute;
            width: 60px;
            height: 40px;
            top: 90px;
            left: 95px;
        }

        .pet-eye {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            top: 15px;
        }

        .eye-left {
            left: 10px;
            animation: blink 5s ease-in-out infinite;
        }

        .eye-right {
            right: 10px;
            animation: blink 5s ease-in-out infinite 0.5s;
        }

        .pet-mouth {
            position: absolute;
            width: 20px;
            height: 8px;
            background: #333;
            border-radius: 0 0 10px 10px;
            top: 30px;
            left: 20px;
            animation: smileMouth 6s ease-in-out infinite;
        }

        /* 动画定义 */
        @keyframes breathe3d {
            0%, 100% { 
                transform: translateZ(20px) scale3d(1, 1, 1);
                box-shadow: 
                    0 0 30px rgba(255, 215, 0, 0.6),
                    inset 0 0 30px rgba(255, 255, 255, 0.3);
            }
            50% { 
                transform: translateZ(25px) scale3d(1.05, 1.02, 1.05);
                box-shadow: 
                    0 0 40px rgba(255, 215, 0, 0.8),
                    inset 0 0 40px rgba(255, 255, 255, 0.4);
            }
        }

        @keyframes headBob {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
        }

        @keyframes blink {
            0%, 40%, 80%, 100% { transform: scaleY(1); }
            20%, 60% { transform: scaleY(0.1); }
        }

        @keyframes tailWag {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(20deg); }
        }

        @keyframes earMove {
            0%, 100% { transform: rotate(-30deg); }
            50% { transform: rotate(-25deg); }
        }

        @keyframes legMove {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes smileMouth {
            0%, 30%, 70%, 100% { 
                border-radius: 0 0 10px 10px;
            }
            50% { 
                border-radius: 10px 10px 10px 10px;
            }
        }

        /* 点击动画 */
        .pet-clicked {
            animation: petClicked 0.3s ease;
        }

        @keyframes petClicked {
            0% { transform: scale3d(1, 1, 1) rotateX(0) rotateY(0); }
            50% { transform: scale3d(1.1, 1.05, 1.1) rotateX(10deg) rotateY(10deg); }
            100% { transform: scale3d(1, 1, 1) rotateX(0) rotateY(0); }
        }

        /* 互动动画类 */
        .bounce-animation {
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 20%, 60%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            80% { transform: translateY(-15px); }
        }

        .spin-animation {
            animation: spin 1s ease;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .shake-animation {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        .pulse-animation {
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .jump-animation {
            animation: jump 0.8s ease;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            25% { transform: translateY(-40px) scale(1.1); }
            50% { transform: translateY(0) scale(1.05); }
            75% { transform: translateY(-20px); }
        }

        .flip-animation {
            animation: flip 0.8s ease;
        }

        @keyframes flip {
            0% { transform: rotateY(0); }
            50% { transform: rotateY(180deg); }
            100% { transform: rotateY(360deg); }
        }

        .wave-animation {
            animation: wave 0.6s ease;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }

        .glow-animation {
            animation: glow 1s ease;
            filter: brightness(1.5) saturate(1.5);
        }

        @keyframes glow {
            0% { filter: brightness(1) saturate(1); }
            50% { filter: brightness(1.5) saturate(1.5) drop-shadow(0 0 20px gold); }
            100% { filter: brightness(1) saturate(1); }
        }

        .confetti-animation {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: confetti 1s ease-out forwards;
        }

        @keyframes confetti {
            0% { 
                transform: translate(0, 0) scale(1); 
                opacity: 1;
            }
            100% { 
                transform: translate(var(--tx, 0), var(--ty, 0)) scale(0); 
                opacity: 0;
            }
        }

        .mood-indicator {
            background: rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            margin-top: 10px;
        }

        .mood-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        /* 饱食度条 */
        .progress-container {
            display: flex;
            align-items: center;
            padding: 0 20px 20px;
            z-index: 5;
            position: relative;
        }

        .progress-label {
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 60px;
        }

        .progress-bar {
            flex: 1;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 10px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 50%; /* 示例饱食度 */
            background: linear-gradient(90deg, #4ECDC4, #44A08D);
            border-radius: 10px;
            transition: width 0.5s ease, background-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            100% { left: 100%; }
        }

        .progress-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 40px;
            text-align: right;
        }

        /* 操作提示 */
        .instructions {
            text-align: center;
            padding: 0 20px 20px;
            z-index: 5;
            position: relative;
        }

        .instruction-text {
            color: white;
            font-size: 14px;
            opacity: 0.8;
        }

        /* 底部导航 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.1);
            z-index: 10;
            position: relative;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* 心情颜色类 */
        .happy { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); } /* 金色 - 开心 */
        .neutral { background: linear-gradient(135deg, #FFA500 0%, #FF8C00 100%); } /* 橙色 - 一般 */
        .sad { background: linear-gradient(135deg, #1E90FF 0%, #4169E1 100%); } /* 蓝色 - 难过 */

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }
            
            .pet-3d-container {
                width: 200px;
                height: 250px;
            }
            
            .pet-body {
                width: 100px;
                height: 80px;
                top: 90px;
                left: 50px;
            }
            
            .pet-head {
                width: 80px;
                height: 80px;
                top: 50px;
                left: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景特效 -->
    <div class="background-effects" id="backgroundEffects"></div>
    
    <div class="container neutral" id="mainContainer">
        <!-- 头部导航 -->
        <div class="header">
            <button class="nav-button" onclick="goToChat()">💬</button>
            <div class="coins-container">
                💰
                <span class="coins-text" id="coinsDisplay">50</span>
            </div>
            <button class="nav-button" onclick="goToShop()">🛒</button>
        </div>

        <!-- 宠物区域 -->
        <div class="pet-area">
            <div class="pet-container">
                <div class="pet-3d-container" id="pet3dContainer" onclick="petClick()" onmousedown="startInteraction(event)" ontouchstart="startInteraction(event)">
                    <div class="pet-3d" id="pet3d">
                        <!-- 宠物身体 -->
                        <div class="pet-part pet-body" id="petBody"></div>
                        
                        <!-- 宠物头部 -->
                        <div class="pet-part pet-head" id="petHead">
                            <!-- 面部特征 -->
                            <div class="pet-face">
                                <div class="pet-part pet-eye eye-left" id="eyeLeft"></div>
                                <div class="pet-part pet-eye eye-right" id="eyeRight"></div>
                                <div class="pet-part pet-mouth" id="mouth"></div>
                            </div>
                        </div>
                        
                        <!-- 宠物耳朵 -->
                        <div class="pet-part pet-ear ear-left" id="earLeft"></div>
                        <div class="pet-part pet-ear ear-right" id="earRight"></div>
                        
                        <!-- 宠物腿部 -->
                        <div class="pet-part pet-leg leg-front-left" id="legFL"></div>
                        <div class="pet-part pet-leg leg-front-right" id="legFR"></div>
                        <div class="pet-part pet-leg leg-back-left" id="legBL"></div>
                        <div class="pet-part pet-leg leg-back-right" id="legBR"></div>
                        
                        <!-- 宠物尾巴 -->
                        <div class="pet-part pet-tail" id="tail"></div>
                    </div>
                </div>
                <div class="mood-indicator">
                    <span class="mood-text" id="moodText">一般</span>
                </div>
            </div>
        </div>

        <!-- 饱食度条 -->
        <div class="progress-container">
            <span class="progress-label">饱食度</span>
            <div class="progress-bar">
                <div class="progress-fill" id="hungerBar"></div>
            </div>
            <span class="progress-text" id="hungerPercent">50%</span>
        </div>

        <!-- 操作提示 -->
        <div class="instructions">
            <p class="instruction-text">点击宠物 +1金币 | 长按喂食</p>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>主页</span>
            </a>
            <a href="shop.html" class="nav-item">
                <span class="nav-icon">🛒</span>
                <span>商店</span>
            </a>
            <a href="chat.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span>对话</span>
            </a>
        </div>
    </div>

    <script>
        // 宠物数据
        let coins = 50;
        let hunger = 50; // 0-100
        let mood = 'neutral'; // happy, neutral, sad
        let isInteracting = false;
        let interactionTimer = null;
        let interactionType = ''; // 'click', 'double', 'long', 'shake', etc.
        let clickCount = 0;
        let lastClickTime = 0;

        // 互动类型映射
        const interactionAnimations = {
            'click': 'bounce-animation',
            'double': 'pulse-animation',
            'triple': 'jump-animation',
            'quad': 'spin-animation',
            'shake': 'shake-animation',
            'wave': 'wave-animation',
            'glow': 'glow-animation',
            'flip': 'flip-animation',
            'celebrate': 'bounce-animation',
            'surprise': 'pulse-animation'
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            createBackgroundEffects();
            updateHungerDisplay();
            
            // 添加鼠标移动事件来增加3D效果
            document.addEventListener('mousemove', function(e) {
                if (!isInteracting) {
                    const pet3d = document.getElementById('pet3d');
                    const rect = pet3d.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    const rotateY = (e.clientX - centerX) / 30;
                    const rotateX = (centerY - e.clientY) / 30;
                    
                    pet3d.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                }
            });
        });

        // 创建背景特效
        function createBackgroundEffects() {
            const container = document.getElementById('backgroundEffects');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                // 随机大小和位置
                const size = Math.random() * 40 + 10;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.top = Math.random() * 100 + '%';
                
                // 随机动画延迟
                bubble.style.animationDelay = Math.random() * 5 + 's';
                
                container.appendChild(bubble);
            }
        }

        // 宠物点击事件 - 支持多种互动
        function petClick(event) {
            const now = new Date().getTime();
            const timeDiff = now - lastClickTime;
            
            // 检测连续点击
            if (timeDiff < 500) {
                clickCount++;
            } else {
                clickCount = 1;
            }
            
            lastClickTime = now;
            
            // 根据点击次数选择不同动画
            let animType = 'click';
            if (clickCount === 2) animType = 'double';
            else if (clickCount === 3) animType = 'triple';
            else if (clickCount >= 4) animType = 'quad';
            
            // 执行互动动画
            executeInteraction(animType);
        }

        // 执行互动动作
        function executeInteraction(type) {
            const pet3d = document.getElementById('pet3d');
            const petBody = document.getElementById('petBody');
            
            // 清除之前的动画类
            Object.values(interactionAnimations).forEach(cls => {
                pet3d.classList.remove(cls);
                petBody.classList.remove(cls);
            });
            
            // 应用新动画
            const animationClass = interactionAnimations[type];
            if (animationClass) {
                pet3d.classList.add(animationClass);
                
                // 添加粒子效果
                createParticles();
                
                // 增加金币
                let coinsToAdd = 1;
                if (type === 'double') coinsToAdd = 2;
                else if (type === 'triple') coinsToAdd = 3;
                else if (type === 'quad') coinsToAdd = 5;
                
                coins += coinsToAdd;
                document.getElementById('coinsDisplay').textContent = coins;
                
                // 宠物表情变化
                changePetExpression(type);
                
                // 重置点击计数（如果动画结束后）
                setTimeout(() => {
                    clickCount = 0;
                }, 1000);
            }
        }

        // 宠物表情变化
        function changePetExpression(type) {
            const mouth = document.getElementById('mouth');
            const originalStyle = mouth.style.borderRadius;
            
            // 根据互动类型改变表情
            switch(type) {
                case 'bounce':
                case 'jump':
                    mouth.style.borderRadius = '15px 15px 15px 15px'; // 开心
                    break;
                case 'pulse':
                case 'glow':
                    mouth.style.borderRadius = '0 0 15px 15px'; // 惊喜
                    break;
                case 'shake':
                    mouth.style.borderRadius = '10px 10px 0 0'; // 微笑
                    break;
                default:
                    mouth.style.borderRadius = '0 0 10px 10px'; // 普通
            }
            
            // 恢复原始表情
            setTimeout(() => {
                mouth.style.borderRadius = originalStyle;
            }, 1000);
        }

        // 开始交互（点击或长按）
        function startInteraction(event) {
            isInteracting = true;
            
            // 开始长按计时器
            interactionTimer = setTimeout(function() {
                // 长按喂食
                feedPet();
            }, 1000);
        }

        // 停止交互
        function stopInteraction(event) {
            isInteracting = false;
            
            if (interactionTimer) {
                clearTimeout(interactionTimer);
                interactionTimer = null;
                
                // 如果不是长按，则是普通点击
                if (clickCount === 0) {
                    // 短按，执行单次点击
                    petClick(event);
                }
            }
        }

        // 喂食宠物
        function feedPet() {
            if (hunger > 0) {
                hunger = Math.max(0, hunger - 20);
                updateHungerDisplay();
                
                // 创建绿色粒子效果（食物）
                createParticles('#4CAF50');
                
                // 宠物反应
                const pet3d = document.getElementById('pet3d');
                pet3d.classList.add('bounce-animation');
                setTimeout(() => {
                    pet3d.classList.remove('bounce-animation');
                }, 600);
                
                alert('宠物吃饱了！');
            } else {
                alert('宠物已经很饱了！');
            }
        }

        // 创建粒子效果
        function createParticles(color = '#FFD700') {
            const petRect = document.getElementById('pet3dContainer').getBoundingClientRect();
            const centerX = petRect.left + petRect.width / 2;
            const centerY = petRect.top + petRect.height / 2;
            
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti-animation';
                particle.style.backgroundColor = color;
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                
                // 随机方向和距离
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 60 + 30;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(particle);
                
                // 移除粒子
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        // 更新饱食度显示
        function updateHungerDisplay() {
            const hungerBar = document.getElementById('hungerBar');
            const hungerPercent = document.getElementById('hungerPercent');
            const moodText = document.getElementById('moodText');
            const mainContainer = document.getElementById('mainContainer');
            
            hungerBar.style.width = (100 - hunger) + '%';
            hungerPercent.textContent = (100 - hunger) + '%';
            
            // 根据饱食度更新心情
            if (hunger <= 30) {
                mood = 'happy';
                moodText.textContent = '开心';
                document.getElementById('mainContainer').className = 'container happy';
                
                // 开心时的宠物外观
                document.querySelectorAll('.pet-part').forEach(part => {
                    part.style.background = 'radial-gradient(circle at 30% 30%, #FFD700, #FFA500, #FF8C00)';
                });
            } else if (hunger <= 70) {
                mood = 'neutral';
                moodText.textContent = '一般';
                document.getElementById('mainContainer').className = 'container neutral';
                
                // 一般时的宠物外观
                document.querySelectorAll('.pet-part').forEach(part => {
                    part.style.background = 'radial-gradient(circle at 30% 30%, #FFA500, #FF8C00, #FF6B35)';
                });
            } else {
                mood = 'sad';
                moodText.textContent = '难过';
                document.getElementById('mainContainer').className = 'container sad';
                
                // 难过时的宠物外观
                document.querySelectorAll('.pet-part').forEach(part => {
                    part.style.background = 'radial-gradient(circle at 30% 30%, #1E90FF, #4169E1, #00008B)';
                });
            }
        }

        // 添加键盘快捷键支持多种互动
        document.addEventListener('keydown', function(e) {
            if (e.key === 's' || e.key === 'S') {
                executeInteraction('shake');
            } else if (e.key === 'w' || e.key === 'W') {
                executeInteraction('wave');
            } else if (e.key === 'g' || e.key === 'G') {
                executeInteraction('glow');
            } else if (e.key === 'f' || e.key === 'F') {
                executeInteraction('flip');
            }
        });

        // 导航功能
        function goToShop() {
            window.location.href = 'shop.html';
        }

        function goToChat() {
            window.location.href = 'chat.html';
        }

        // 添加鼠标事件监听器
        document.addEventListener('mouseup', stopInteraction);
        document.addEventListener('mouseleave', stopInteraction);
        document.addEventListener('touchend', function(e) {
            stopInteraction(e);
        });
    </script>
</body>
</html>
