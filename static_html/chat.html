<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话 - GlowBuddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
            min-height: 100vh;
            background: #F5F7FA;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: white;
            border-bottom: 1px solid #E0E0E0;
        }

        .back-button {
            background: none;
            border: none;
            font-size: 28px;
            color: #333;
            cursor: pointer;
            padding: 5px;
        }

        .chat-info {
            display: flex;
            align-items: center;
        }

        .chat-title {
            font-size: 18px;
            font-weight: bold;
            margin-left: 8px;
            color: #333;
        }

        .daily-counter {
            background: #FF9800;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .counter-text {
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        /* 消息列表 */
        .messages-list {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message-container {
            margin: 5px 0;
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            margin: 5px 0;
        }

        .user-bubble {
            background: #4CAF50;
            color: white;
        }

        .ai-bubble {
            background: #2196F3;
            color: white;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            text-align: right;
            margin-top: 5px;
        }

        /* 输入区域 */
        .input-container {
            padding: 5px 10px 10px;
            background: white;
            border-top: 1px solid #E0E0E0;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            background: #F0F0F0;
            border-radius: 25px;
            padding: 5px 15px;
        }

        .text-input {
            flex: 1;
            max-height: 100px;
            min-height: 40px;
            font-size: 16px;
            padding: 8px 10px;
            border: none;
            background: transparent;
            resize: none;
        }

        .send-button {
            background: #2196F3;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            margin-left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-button:disabled {
            background: #B0B0B0;
        }

        /* API 配置提醒 */
        .api-alert {
            background: #FFF3CD;
            border: 1px solid #FFEAA7;
            padding: 10px;
            text-align: center;
        }

        .api-alert-text {
            color: #856404;
            font-size: 12px;
        }

        /* 底部导航 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <button class="back-button">←</button>
            <div class="chat-info">
                💬
                <span class="chat-title">AI 对话</span>
            </div>
            <div class="daily-counter">
                <span class="counter-text">28/30</span>
            </div>
        </div>

        <!-- 消息列表 -->
        <div class="messages-list" id="messagesList">
            <div class="message-container user-message">
                <div class="message-bubble user-bubble">
                    你好，GlowBuddy！
                    <div class="message-time">10:30</div>
                </div>
            </div>
            <div class="message-container">
                <div class="message-bubble ai-bubble">
                    你好呀！我是你的 GlowBuddy，很高兴见到你！有什么我可以帮你的吗？
                    <div class="message-time">10:30</div>
                </div>
            </div>
            <div class="message-container user-message">
                <div class="message-bubble user-bubble">
                    今天天气怎么样？
                    <div class="message-time">10:31</div>
                </div>
            </div>
            <div class="message-container">
                <div class="message-bubble ai-bubble">
                    我是一个虚拟宠物，无法感知天气，但我希望你度过美好的一天！
                    <div class="message-time">10:31</div>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea class="text-input" id="messageInput" placeholder="和你的宠物聊聊天..."></textarea>
                <button class="send-button" id="sendButton">➤</button>
            </div>
        </div>

        <!-- API 配置提醒 -->
        <div class="api-alert">
            <span class="api-alert-text">⚠️ OpenAI API 未配置，将使用模拟响应</span>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>主页</span>
            </a>
            <a href="shop.html" class="nav-item">
                <span class="nav-icon">🛒</span>
                <span>商店</span>
            </a>
            <a href="chat.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span>对话</span>
            </a>
        </div>
    </div>

    <script>
        // 模拟聊天功能
        document.addEventListener('DOMContentLoaded', function() {
            const messagesList = document.getElementById('messagesList');
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            
            // 发送消息
            function sendMessage() {
                const message = messageInput.value.trim();
                if (message === '') return;
                
                // 添加用户消息
                addMessage(message, 'user');
                messageInput.value = '';
                
                // 模拟 AI 回复
                setTimeout(() => {
                    const responses = [
                        "很高兴你跟我聊天！你的电子宠物今天看起来很开心呢！",
                        "哇，听起来很有趣！我也想听听更多关于你的故事。",
                        "谢谢你的关心！我最喜欢和你聊天了。",
                        "今天的天气怎么样？我们可以一起聊聊外面的世界。",
                        "你知道吗？我每天都能学到新东西，多亏了有你陪伴。",
                        "我感到很幸福，因为有你这样的朋友。",
                        "我们可以一起玩个小游戏，你想试试吗？",
                        "你今天过得怎么样？希望你像我一样开心！",
                        "如果我是一个真实的小动物，我想我会很喜欢你的。",
                        "和你聊天总是让我感到特别快乐！"
                    ];
                    
                    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                    addMessage(randomResponse, 'ai');
                }, 1000);
            }
            
            // 添加消息到列表
            function addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message-container ${sender === 'user' ? 'user-message' : ''}`;
                
                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = `message-bubble ${sender === 'user' ? 'user-bubble' : 'ai-bubble'}`;
                
                const now = new Date();
                const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                
                bubbleDiv.innerHTML = `${text}<div class="message-time">${timeString}</div>`;
                
                messageDiv.appendChild(bubbleDiv);
                messagesList.appendChild(messageDiv);
                
                // 滚动到底部
                messagesList.scrollTop = messagesList.scrollHeight;
            }
            
            // 发送按钮事件
            sendButton.addEventListener('click', sendMessage);
            
            // 回车键发送
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
