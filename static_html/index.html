<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowBuddy - 3D电子宠物应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); /* 默认开心颜色 - 金色 */
            transition: background 0.8s ease;
            position: relative;
            overflow: hidden;
        }

        /* 背景特效 */
        .background-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,215,0,0.3) 100%);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.7;
            }
            50% { 
                transform: translateY(-20px) translateX(10px) scale(1.1);
                opacity: 0.9;
            }
        }

        /* 头部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 10;
            position: relative;
        }

        .nav-button {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
            padding: 5px;
        }

        .coins-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .coins-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-left: 5px;
        }

        /* 3D 宠物容器 */
        .threejs-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 5;
        }

        #petCanvas {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,215,0,0.1) 100%);
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .mood-indicator {
            background: rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            margin-top: 20px;
        }

        .mood-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        /* 饱食度条 */
        .progress-container {
            display: flex;
            align-items: center;
            padding: 0 20px 20px;
            z-index: 5;
            position: relative;
        }

        .progress-label {
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 60px;
        }

        .progress-bar {
            flex: 1;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 10px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 50%; /* 示例饱食度 */
            background: linear-gradient(90deg, #4ECDC4, #44A08D);
            border-radius: 10px;
            transition: width 0.5s ease, background-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            100% { left: 100%; }
        }

        .progress-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 40px;
            text-align: right;
        }

        /* 操作提示 */
        .instructions {
            text-align: center;
            padding: 0 20px 20px;
            z-index: 5;
            position: relative;
        }

        .instruction-text {
            color: white;
            font-size: 14px;
            opacity: 0.8;
        }

        /* 底部导航 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.1);
            z-index: 10;
            position: relative;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* 心情颜色类 */
        .container.happy { 
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); /* 金色 - 开心 */
        }
        .container.neutral { 
            background: linear-gradient(135deg, #FFA500 0%, #FF8C00 100%); /* 橙色 - 一般 */
        }
        .container.sad { 
            background: linear-gradient(135deg, #1E90FF 0%, #4169E1 100%); /* 蓝色 - 难过 */
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }
            
            #petCanvas {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景特效 -->
    <div class="background-effects" id="backgroundEffects"></div>
    
    <div class="container neutral" id="mainContainer">
        <!-- 头部导航 -->
        <div class="header">
            <button class="nav-button" onclick="goToChat()">💬</button>
            <div class="coins-container">
                💰
                <span class="coins-text" id="coinsDisplay">50</span>
            </div>
            <button class="nav-button" onclick="goToShop()">🛒</button>
        </div>

        <!-- 3D 宠物区域 -->
        <div class="threejs-container">
            <div id="petCanvas"></div>
            <div class="mood-indicator">
                <span class="mood-text" id="moodText">一般</span>
            </div>
        </div>

        <!-- 饱食度条 -->
        <div class="progress-container">
            <span class="progress-label">饱食度</span>
            <div class="progress-bar">
                <div class="progress-fill" id="hungerBar"></div>
            </div>
            <span class="progress-text" id="hungerPercent">50%</span>
        </div>

        <!-- 操作提示 -->
        <div class="instructions">
            <p class="instruction-text">点击宠物 +1金币 | 长按喂食 | 双击跳跃 | 三击旋转</p>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>主页</span>
            </a>
            <a href="shop.html" class="nav-item">
                <span class="nav-icon">🛒</span>
                <span>商店</span>
            </a>
            <a href="chat.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span>对话</span>
            </a>
        </div>
    </div>

    <!-- 引入 Three.js 及其扩展库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.min.js"></script>
    <script>
        // 宠物数据
        let coins = 50;
        let hunger = 50; // 0-100
        let mood = 'neutral'; // happy, neutral, sad
        let isInteracting = false;
        let interactionTimer = null;
        let clickCount = 0;
        let lastClickTime = 0;

        // Three.js 相关变量
        let scene, camera, renderer, petModel;
        let gltfLoader = new THREE.GLTFLoader();

        // 初始化 Three.js
        function initThreeJS() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xF5F7FA); // 淡灰色背景
            scene.fog = new THREE.Fog(0xF5F7FA, 10, 20);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(75, 300 / 300, 0.1, 1000);
            camera.position.set(0, 0, 5);
            
            // 创建渲染器
            const container = document.getElementById('petCanvas');
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                logarithmicDepthBuffer: true
            });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setClearColor(0xF5F7FA, 1); // 设置背景色
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.innerHTML = '';
            container.appendChild(renderer.domElement);
            
            // 添加光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 5, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            scene.add(directionalLight);
            
            const pointLight = new THREE.PointLight(0xFFD700, 1, 10);
            pointLight.position.set(2, 2, 2);
            pointLight.castShadow = true;
            scene.add(pointLight);
            
            // 加载 Gizmo 3D 模型
            loadGizmoModel();
            
            // 开始渲染循环
            animate();
            
            // 添加交互事件
            setupInteractions();
        }

        // 加载 Gizmo 3D 模型
        function loadGizmoModel() {
            // 由于我们无法直接从文件系统加载 .blend 文件，我们创建一个高质量的模拟模型
            // 这里我们创建一个代表 Gizmo 特征的复杂几何体
            
            // 创建 Gizmo 主体（类似于一个圆润的立方体）
            const bodyGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const bodyMaterial = new THREE.MeshStandardMaterial({ 
                color: getMoodColor(),
                metalness: 0.3,
                roughness: 0.4,
                emissive: 0x222222
            });
            
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.castShadow = true;
            body.receiveShadow = true;
            
            // 创建头部（球体）
            const headGeometry = new THREE.SphereGeometry(0.4, 32, 32);
            const headMaterial = new THREE.MeshStandardMaterial({ 
                color: getMoodColor(),
                metalness: 0.2,
                roughness: 0.3,
                emissive: 0x111111
            });
            
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.set(0.6, 0.6, 0);
            head.castShadow = true;
            
            // 创建眼睛
            const eyeGeometry = new THREE.SphereGeometry(0.08, 16, 16);
            const eyeMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x000000,
                metalness: 0.8,
                roughness: 0.2
            });
            
            const eyeLeft = new THREE.Mesh(eyeGeometry, eyeMaterial);
            eyeLeft.position.set(0.75, 0.7, 0.2);
            eyeLeft.castShadow = true;
            
            const eyeRight = new THREE.Mesh(eyeGeometry, eyeMaterial);
            eyeRight.position.set(0.75, 0.7, -0.2);
            eyeRight.castShadow = true;
            
            // 创建嘴巴（椭圆环）
            const mouthGeometry = new THREE.TorusGeometry(0.15, 0.03, 16, 32, Math.PI);
            const mouthMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x000000,
                metalness: 0.5,
                roughness: 0.5
            });
            
            const mouth = new THREE.Mesh(mouthGeometry, mouthMaterial);
            mouth.position.set(0.85, 0.5, 0);
            mouth.rotation.x = Math.PI / 2;
            mouth.castShadow = true;
            
            // 创建耳朵
            const earGeometry = new THREE.ConeGeometry(0.15, 0.4, 8);
            const earMaterial = new THREE.MeshStandardMaterial({ 
                color: getMoodColor(),
                metalness: 0.2,
                roughness: 0.4
            });
            
            const earLeft = new THREE.Mesh(earGeometry, earMaterial);
            earLeft.position.set(0.4, 1.0, 0.25);
            earLeft.rotation.z = Math.PI / 6;
            earLeft.castShadow = true;
            
            const earRight = new THREE.Mesh(earGeometry, earMaterial);
            earRight.position.set(0.4, 1.0, -0.25);
            earRight.rotation.z = -Math.PI / 6;
            earRight.castShadow = true;
            
            // 创建腿
            const legGeometry = new THREE.CylinderGeometry(0.08, 0.08, 0.4, 8);
            const legMaterial = new THREE.MeshStandardMaterial({ 
                color: getMoodColor(),
                metalness: 0.3,
                roughness: 0.4
            });
            
            const legFL = new THREE.Mesh(legGeometry, legMaterial);
            legFL.position.set(0.2, -0.5, 0.2);
            legFL.rotation.x = Math.PI / 2;
            legFL.castShadow = true;
            
            const legFR = new THREE.Mesh(legGeometry, legMaterial);
            legFR.position.set(0.2, -0.5, -0.2);
            legFR.rotation.x = Math.PI / 2;
            legFR.castShadow = true;
            
            const legBL = new THREE.Mesh(legGeometry, legMaterial);
            legBL.position.set(-0.2, -0.5, 0.2);
            legBL.rotation.x = Math.PI / 2;
            legBL.castShadow = true;
            
            const legBR = new THREE.Mesh(legGeometry, legMaterial);
            legBR.position.set(-0.2, -0.5, -0.2);
            legBR.rotation.x = Math.PI / 2;
            legBR.castShadow = true;
            
            // 创建尾巴
            const tailGeometry = new THREE.ConeGeometry(0.05, 0.6, 8);
            const tailMaterial = new THREE.MeshStandardMaterial({ 
                color: getMoodColor(),
                metalness: 0.2,
                roughness: 0.4
            });
            
            const tail = new THREE.Mesh(tailGeometry, tailMaterial);
            tail.position.set(-0.7, 0.2, 0);
            tail.rotation.z = -Math.PI / 4;
            tail.castShadow = true;
            
            // 创建基座
            const baseGeometry = new THREE.CylinderGeometry(1.0, 1.0, 0.1, 32);
            const baseMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xDDDDEE,
                metalness: 0.1,
                roughness: 0.8
            });
            
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            base.position.y = -1.0;
            base.receiveShadow = true;
            
            // 将所有部分组合成一个组
            petModel = new THREE.Group();
            petModel.add(body);
            petModel.add(head);
            petModel.add(eyeLeft);
            petModel.add(eyeRight);
            petModel.add(mouth);
            petModel.add(earLeft);
            petModel.add(earRight);
            petModel.add(legFL);
            petModel.add(legFR);
            petModel.add(legBL);
            petModel.add(legBR);
            petModel.add(tail);
            petModel.add(base);
            
            scene.add(petModel);
        }

        // 获取心情对应的颜色
        function getMoodColor() {
            switch (mood) {
                case 'happy': return 0xFFD700; // 金色 - 开心
                case 'neutral': return 0xFFA500; // 橙色 - 一般
                case 'sad': return 0x1E90FF; // 蓝色 - 难过
                default: return 0xFFA500;
            }
        }

        // 更新宠物颜色
        function updatePetColors() {
            const color = getMoodColor();
            
            // 更新模型各部分的颜色
            petModel.traverse(function(child) {
                if (child.isMesh && child.material && child.material.color) {
                    if (child !== eyeLeft && child !== eyeRight && child !== mouth) {
                        child.material.color.set(color);
                    }
                }
            });
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 宠物呼吸动画
            if (petModel) {
                const time = Date.now() * 0.001;
                petModel.scale.y = 1 + Math.sin(time) * 0.03;
                petModel.scale.x = 1 + Math.cos(time * 0.8) * 0.01;
            }
            
            // 耳朵摆动
            if (petModel) {
                const earTime = Date.now() * 0.002;
                if (petModel.children) {
                    // 找到耳朵并摆动
                    const earLeft = petModel.children.find(child => child.position.x === 0.4 && child.position.z === 0.25);
                    const earRight = petModel.children.find(child => child.position.x === 0.4 && child.position.z === -0.25);
                    
                    if (earLeft) {
                        earLeft.rotation.z = Math.PI / 6 + Math.sin(earTime) * 0.15;
                    }
                    if (earRight) {
                        earRight.rotation.z = -Math.PI / 6 + Math.sin(earTime + 1) * 0.15;
                    }
                }
            }
            
            // 尾巴摆动
            if (petModel) {
                const tailTime = Date.now() * 0.0015;
                if (petModel.children) {
                    const tail = petModel.children.find(child => child.position.x === -0.7);
                    if (tail) {
                        tail.rotation.z = -Math.PI / 4 + Math.sin(tailTime) * 0.2;
                    }
                }
            }
            
            // 眼睛眨动
            if (petModel) {
                const blinkTime = Date.now() * 0.0005;
                if (Math.abs(Math.sin(blinkTime * 3)) > 0.99) {
                    // 找到眼睛并眨眼
                    const eyeLeft = petModel.children.find(child => child.position.z === 0.2);
                    const eyeRight = petModel.children.find(child => child.position.z === -0.2);
                    
                    if (eyeLeft) {
                        eyeLeft.scale.y = 0.1;
                    }
                    if (eyeRight) {
                        eyeRight.scale.y = 0.1;
                    }
                    
                    setTimeout(() => {
                        if (eyeLeft) eyeLeft.scale.y = 1;
                        if (eyeRight) eyeRight.scale.y = 1;
                    }, 50);
                }
            }
            
            // 旋转动画（如果在执行）
            if (window.isRotating) {
                if (petModel) {
                    petModel.rotation.y += 0.1;
                }
            }
            
            renderer.render(scene, camera);
        }

        // 设置交互事件
        function setupInteractions() {
            const canvas = document.getElementById('petCanvas');
            
            canvas.addEventListener('click', function(event) {
                const now = Date.now();
                
                if (now - lastClickTime < 500) {
                    clickCount++;
                } else {
                    clickCount = 1;
                }
                
                lastClickTime = now;
                
                // 根据点击次数执行不同动画
                if (clickCount === 1) {
                    handleSingleClick();
                } else if (clickCount === 2) {
                    handleDouble();
                } else if (clickCount === 3) {
                    handleTriple();
                } else if (clickCount >= 4) {
                    handleQuadruple();
                }
                
                // 重置点击计数
                setTimeout(() => {
                    if (now === lastClickTime) {
                        clickCount = 0;
                    }
                }, 500);
            });
            
            // 长按喂食
            canvas.addEventListener('mousedown', startFeeding);
            canvas.addEventListener('mouseup', stopFeeding);
            canvas.addEventListener('mouseleave', stopFeeding);
            
            // 触摸设备支持
            canvas.addEventListener('touchstart', function(e) {
                startFeeding();
                e.preventDefault();
            });
            
            canvas.addEventListener('touchend', function(e) {
                stopFeeding();
                e.preventDefault();
            });
        }

        // 单击处理
        function handleSingleClick() {
            // 增加金币
            coins += 1;
            document.getElementById('coinsDisplay').textContent = coins;
            
            // 创建粒子效果
            createParticles(10, '#FFD700');
            
            // 宠物弹跳动画
            if (petModel) {
                petModel.position.y += 0.2;
                setTimeout(() => {
                    if (petModel) {
                        petModel.position.y -= 0.2;
                    }
                }, 200);
            }
            
            // 宠物表情变化
            if (petModel) {
                // 找到嘴巴并改变表情
                const mouth = petModel.children.find(child => child.geometry && child.geometry.parameters && child.geometry.parameters.radiusTubular === 0.03);
                if (mouth) {
                    const originalRotation = mouth.rotation.z;
                    mouth.rotation.z = -Math.PI / 2; // 更开心的表情
                    setTimeout(() => {
                        if (mouth) {
                            mouth.rotation.z = originalRotation;
                        }
                    }, 300);
                }
            }
        }

        // 双击处理
        function handleDouble() {
            // 增加更多金币
            coins += 2;
            document.getElementById('coinsDisplay').textContent = coins;
            
            // 创建更多粒子效果
            createParticles(20, '#4CAF50');
            
            // 宠物跳跃动画
            if (petModel) {
                petModel.position.y += 0.5;
                setTimeout(() => {
                    if (petModel) {
                        petModel.position.y -= 0.5;
                    }
                }, 300);
            }
        }

        // 三击处理
        function handleTriple() {
            // 增加更多金币
            coins += 3;
            document.getElementById('coinsDisplay').textContent = coins;
            
            // 创建大量粒子效果
            createParticles(30, '#FFD700');
            
            // 开始旋转动画
            window.isRotating = true;
            setTimeout(() => {
                window.isRotating = false;
            }, 2000);
        }

        // 四击处理
        function handleQuadruple() {
            // 增加大量金币
            coins += 5;
            document.getElementById('coinsDisplay').textContent = coins;
            
            // 创建大量彩色粒子
            createParticles(50, '#FF69B4');
            
            // 发光效果
            if (petModel) {
                petModel.children.forEach(child => {
                    if (child.material && child.material.emissive) {
                        child.material.emissive.setHex(0xffaa00);
                        setTimeout(() => {
                            if (child.material && child.material.emissive) {
                                child.material.emissive.setHex(0x222222);
                            }
                        }, 1000);
                    }
                });
            }
        }

        // 开始喂食
        function startFeeding() {
            interactionTimer = setTimeout(function() {
                feedPet();
            }, 1000);
        }

        // 停止喂食
        function stopFeeding() {
            if (interactionTimer) {
                clearTimeout(interactionTimer);
                interactionTimer = null;
            }
        }

        // 喂食宠物
        function feedPet() {
            if (hunger > 0) {
                hunger = Math.max(0, hunger - 20);
                updateHungerDisplay();
                
                // 创建绿色粒子效果（食物）
                createParticles(15, '#4CAF50');
                
                // 宠物反应
                if (petModel) {
                    petModel.scale.set(1.2, 1.1, 1.2); // 短暂放大
                    setTimeout(() => {
                        if (petModel) {
                            petModel.scale.set(1, 1, 1);
                        }
                    }, 300);
                }
                
                alert('宠物吃饱了！');
            } else {
                alert('宠物已经很饱了！');
            }
        }

        // 创建粒子效果
        function createParticles(count = 10, color = '#FFD700') {
            const canvasRect = document.getElementById('petCanvas').getBoundingClientRect();
            const centerX = canvasRect.left + canvasRect.width / 2;
            const centerY = canvasRect.top + canvasRect.height / 2;
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.backgroundColor = color;
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                
                // 随机方向和距离
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 60 + 30;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(particle);
                
                // 动画粒子
                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 1000,
                    easing: 'ease-out'
                });
                
                // 移除粒子
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        // 更新饱食度显示
        function updateHungerDisplay() {
            const hungerBar = document.getElementById('hungerBar');
            const hungerPercent = document.getElementById('hungerPercent');
            const moodText = document.getElementById('moodText');
            const mainContainer = document.getElementById('mainContainer');
            
            hungerBar.style.width = (100 - hunger) + '%';
            hungerPercent.textContent = (100 - hunger) + '%';
            
            // 根据饱食度更新心情
            if (hunger <= 30) {
                mood = 'happy';
                moodText.textContent = '开心';
                document.getElementById('mainContainer').className = 'container happy';
            } else if (hunger <= 70) {
                mood = 'neutral';
                moodText.textContent = '一般';
                document.getElementById('mainContainer').className = 'container neutral';
            } else {
                mood = 'sad';
                moodText.textContent = '难过';
                document.getElementById('mainContainer').className = 'container sad';
            }
            
            // 更新宠物颜色
            updatePetColors();
        }

        // 创建背景特效
        function createBackgroundEffects() {
            const container = document.getElementById('backgroundEffects');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                // 随机大小和位置
                const size = Math.random() * 40 + 10;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.top = Math.random() * 100 + '%';
                
                // 随机动画延迟
                bubble.style.animationDelay = Math.random() * 5 + 's';
                
                container.appendChild(bubble);
            }
        }

        // 导航功能
        function goToShop() {
            window.location.href = 'shop.html';
        }

        function goToChat() {
            window.location.href = 'chat.html';
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            createBackgroundEffects();
            initThreeJS();
            updateHungerDisplay();
            
            // 检查每日奖励
            checkDailyReward();
        });

        // 检查每日奖励
        function checkDailyReward() {
            const today = new Date().toDateString();
            const lastRewardDate = localStorage.getItem('lastRewardDate');
            
            if (lastRewardDate !== today) {
                // 发放每日奖励
                coins += 10;
                document.getElementById('coinsDisplay').textContent = coins;
                localStorage.setItem('lastRewardDate', today);
                alert('每日奖励', '获得10枚金币！');
            }
        }

        // 响应式处理
        window.addEventListener('resize', function() {
            if (renderer && camera) {
                const container = document.getElementById('petCanvas');
                renderer.setSize(container.clientWidth, container.clientHeight);
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
            }
        });
    </script>
</body>
</html>
