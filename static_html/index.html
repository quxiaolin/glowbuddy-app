<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowBuddy - 电子宠物应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
            min-height: 100vh;
            background: #FFA500; /* 默认心情颜色 - 中性 */
            transition: background 0.3s ease;
        }

        /* 头部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-button {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
            padding: 5px;
        }

        .coins-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .coins-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-left: 5px;
        }

        /* 宠物区域 */
        .pet-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .pet-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pet {
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* SVG 宠物样式 */
        .pet-svg {
            width: 150px;
            height: 150px;
            transition: all 0.3s ease;
        }

        /* 宠物动画 */
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes blink {
            0%, 40%, 80%, 100% { transform: scaleY(1); }
            20%, 60% { transform: scaleY(0.1); }
        }

        @keyframes happyBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes sadWobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .pet-animated {
            animation: breathe 3s ease-in-out infinite;
        }

        .eye-left, .eye-right {
            animation: blink 4s ease-in-out infinite;
        }

        .happy-animation {
            animation: happyBounce 2s ease-in-out infinite;
        }

        .sad-animation {
            animation: sadWobble 4s ease-in-out infinite;
        }

        .mood-indicator {
            background: rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .mood-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        /* 饱食度条 */
        .progress-container {
            display: flex;
            align-items: center;
            padding: 0 20px 20px;
        }

        .progress-label {
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 60px;
        }

        .progress-bar {
            flex: 1;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 10px;
        }

        .progress-fill {
            height: 100%;
            width: 50%; /* 示例饱食度 */
            background: #4ECDC4;
            border-radius: 10px;
            transition: width 0.5s ease, background-color 0.3s ease;
        }

        .progress-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 40px;
            text-align: right;
        }

        /* 操作提示 */
        .instructions {
            text-align: center;
            padding: 0 20px 20px;
        }

        .instruction-text {
            color: white;
            font-size: 14px;
            opacity: 0.8;
        }

        /* 底部导航 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* 心情颜色类 */
        .happy { background: #FFD700; } /* 金色 - 开心 */
        .neutral { background: #FFA500; } /* 橙色 - 一般 */
        .sad { background: #1E90FF; } /* 蓝色 - 难过 */

        /* 点击动画 */
        .pet-clicked {
            transform: scale(1.1);
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }
            
            .pet {
                width: 180px;
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="container neutral" id="mainContainer">
        <!-- 头部导航 -->
        <div class="header">
            <button class="nav-button" onclick="goToChat()">💬</button>
            <div class="coins-container">
                💰
                <span class="coins-text" id="coinsDisplay">50</span>
            </div>
            <button class="nav-button" onclick="goToShop()">🛒</button>
        </div>

        <!-- 宠物区域 -->
        <div class="pet-area">
            <div class="pet-container">
                <div class="pet pet-animated" id="petElement" onclick="petClick()">
                    <svg class="pet-svg" viewBox="0 0 100 100" id="petSvg">
                        <!-- 宠物身体 -->
                        <circle cx="50" cy="50" r="35" fill="white" fill-opacity="0.7" id="petBody"/>
                        
                        <!-- 宠物眼睛 -->
                        <circle class="eye-left" cx="35" cy="40" r="5" fill="#333" id="eyeLeft"/>
                        <circle class="eye-right" cx="65" cy="40" r="5" fill="#333" id="eyeRight"/>
                        
                        <!-- 宠物嘴巴 -->
                        <path d="M 40 65 Q 50 75 60 65" stroke="#333" stroke-width="2" fill="none" id="mouth"/>
                        
                        <!-- 宠物耳朵 -->
                        <ellipse cx="25" cy="25" rx="8" ry="12" fill="white" fill-opacity="0.7" id="earLeft"/>
                        <ellipse cx="75" cy="25" rx="8" ry="12" fill="white" fill-opacity="0.7" id="earRight"/>
                        
                        <!-- 宠物尾巴 -->
                        <path d="M 85 60 Q 95 50 90 40" stroke="white" stroke-width="5" stroke-opacity="0.7" fill="none" id="tail"/>
                    </svg>
                </div>
                <div class="mood-indicator">
                    <span class="mood-text" id="moodText">一般</span>
                </div>
            </div>
        </div>

        <!-- 饱食度条 -->
        <div class="progress-container">
            <span class="progress-label">饱食度</span>
            <div class="progress-bar">
                <div class="progress-fill" id="hungerBar"></div>
            </div>
            <span class="progress-text" id="hungerPercent">50%</span>
        </div>

        <!-- 操作提示 -->
        <div class="instructions">
            <p class="instruction-text">点击宠物 +1金币 | 长按喂食</p>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>主页</span>
            </a>
            <a href="shop.html" class="nav-item">
                <span class="nav-icon">🛒</span>
                <span>商店</span>
            </a>
            <a href="chat.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span>对话</span>
            </a>
        </div>
    </div>

    <script>
        // 宠物数据
        let coins = 50;
        let hunger = 50; // 0-100
        let mood = 'neutral'; // happy, neutral, sad
        let isFeeding = false;
        let feedTimer = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateHungerDisplay();
            
            // 长按喂食功能
            const petElement = document.getElementById('petElement');
            
            petElement.addEventListener('mousedown', startFeeding);
            petElement.addEventListener('mouseup', stopFeeding);
            petElement.addEventListener('mouseleave', stopFeeding);
            
            // 触摸设备支持
            petElement.addEventListener('touchstart', function(e) {
                startFeeding();
                e.preventDefault();
            });
            
            petElement.addEventListener('touchend', function(e) {
                stopFeeding();
                e.preventDefault();
            });
        });

        // 更新饱食度显示
        function updateHungerDisplay() {
            const hungerBar = document.getElementById('hungerBar');
            const hungerPercent = document.getElementById('hungerPercent');
            const moodText = document.getElementById('moodText');
            const mainContainer = document.getElementById('mainContainer');
            const petBody = document.getElementById('petBody');
            const mouth = document.getElementById('mouth');
            const tail = document.getElementById('tail');
            
            hungerBar.style.width = (100 - hunger) + '%';
            hungerPercent.textContent = (100 - hunger) + '%';
            
            // 根据饱食度更新心情
            if (hunger <= 30) {
                mood = 'happy';
                moodText.textContent = '开心';
                
                // 开心时的宠物外观
                petBody.setAttribute('fill-opacity', '0.9');
                mouth.setAttribute('d', 'M 40 70 Q 50 80 60 70'); // 笑脸
                tail.style.stroke = '#FFD700';
                
                // 添加动画类
                document.getElementById('petSvg').classList.add('happy-animation');
                document.getElementById('petSvg').classList.remove('sad-animation');
            } else if (hunger <= 70) {
                mood = 'neutral';
                moodText.textContent = '一般';
                
                // 一般时的宠物外观
                petBody.setAttribute('fill-opacity', '0.7');
                mouth.setAttribute('d', 'M 40 65 Q 50 75 60 65'); // 中性脸
                tail.style.stroke = 'white';
                
                // 移除动画类
                document.getElementById('petSvg').classList.remove('happy-animation', 'sad-animation');
            } else {
                mood = 'sad';
                moodText.textContent = '难过';
                
                // 难过时的宠物外观
                petBody.setAttribute('fill-opacity', '0.5');
                mouth.setAttribute('d', 'M 40 60 Q 50 50 60 60'); // 哭脸
                tail.style.stroke = '#1E90FF';
                
                // 添加动画类
                document.getElementById('petSvg').classList.add('sad-animation');
                document.getElementById('petSvg').classList.remove('happy-animation');
            }
            
            // 更新背景颜色
            mainContainer.className = 'container ' + mood;
        }

        // 宠物点击事件
        function petClick() {
            // 增加金币
            coins += 1;
            document.getElementById('coinsDisplay').textContent = coins;
            
            // 简单的点击动画
            const petElement = document.getElementById('petElement');
            petElement.classList.add('pet-clicked');
            setTimeout(() => {
                petElement.classList.remove('pet-clicked');
            }, 200);
            
            // 宠物表情变化
            const mouth = document.getElementById('mouth');
            const originalPath = mouth.getAttribute('d');
            mouth.setAttribute('d', 'M 40 75 Q 50 85 60 75'); // 瞬间开心
            setTimeout(() => {
                updateHungerDisplay(); // 恢复到正确的心情状态
            }, 300);
        }

        // 开始喂食
        function startFeeding() {
            feedTimer = setTimeout(function() {
                if (hunger > 0) {
                    hunger = Math.max(0, hunger - 20);
                    updateHungerDisplay();
                    alert('宠物吃饱了！');
                } else {
                    alert('宠物已经很饱了！');
                }
            }, 1000); // 1秒后喂食
        }

        // 停止喂食
        function stopFeeding() {
            if (feedTimer) {
                clearTimeout(feedTimer);
                feedTimer = null;
            }
        }

        // 导航功能
        function goToShop() {
            window.location.href = 'shop.html';
        }

        function goToChat() {
            window.location.href = 'chat.html';
        }
    </script>
</body>
</html>
