<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowBuddy - 3D电子宠物应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); /* 默认开心颜色 - 金色 */
            transition: background 0.8s ease;
            position: relative;
            overflow: hidden;
        }

        /* 背景特效 */
        .background-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,215,0,0.3) 100%);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.7;
            }
            50% { 
                transform: translateY(-20px) translateX(10px) scale(1.1);
                opacity: 0.9;
            }
        }

        /* 头部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 10;
            position: relative;
        }

        .nav-button {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
            padding: 5px;
        }

        .coins-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .coins-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-left: 5px;
        }

        /* 宠物区域 */
        .pet-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 5;
        }

        .pet-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 3D 宠物容器 */
        .pet-3d-container {
            width: 220px;
            height: 220px;
            perspective: 1000px;
            margin-bottom: 20px;
            cursor: pointer;
            position: relative;
        }

        .pet-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }

        .pet-3d:hover {
            transform: rotateX(5deg) rotateY(5deg);
        }

        /* 宠物主体 - 3D 球体效果 */
        .pet-body {
            position: absolute;
            width: 150px;
            height: 150px;
            left: 35px;
            top: 35px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FFA500, #FF8C00);
            box-shadow: 
                0 0 30px rgba(255, 215, 0, 0.6),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translateZ(20px);
            animation: breathe3d 3s ease-in-out infinite;
        }

        @keyframes breathe3d {
            0%, 100% { 
                transform: translateZ(20px) scale3d(1, 1, 1);
                box-shadow: 
                    0 0 30px rgba(255, 215, 0, 0.6),
                    inset 0 0 30px rgba(255, 255, 255, 0.3);
            }
            50% { 
                transform: translateZ(25px) scale3d(1.05, 1.02, 1.05);
                box-shadow: 
                    0 0 40px rgba(255, 215, 0, 0.8),
                    inset 0 0 40px rgba(255, 255, 255, 0.4);
            }
        }

        /* 宠物脸部 */
        .pet-face {
            position: relative;
            width: 100px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 眼睛 */
        .pet-eye {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #333;
            border-radius: 50%;
            top: 25px;
        }

        .eye-left {
            left: 25px;
            animation: blink 4s ease-in-out infinite;
        }

        .eye-right {
            right: 25px;
            animation: blink 4s ease-in-out infinite 0.5s;
        }

        @keyframes blink {
            0%, 40%, 80%, 100% { 
                transform: scaleY(1);
            }
            20%, 60% { 
                transform: scaleY(0.1);
            }
        }

        /* 嘴巴 */
        .pet-mouth {
            position: absolute;
            width: 30px;
            height: 10px;
            background: #333;
            border-radius: 0 0 15px 15px;
            top: 50px;
            animation: smile 5s ease-in-out infinite;
        }

        @keyframes smile {
            0%, 45%, 55%, 100% { 
                border-radius: 0 0 15px 15px;
            }
            50% { 
                border-radius: 15px 15px 15px 15px;
            }
        }

        /* 耳朵 */
        .pet-ear {
            position: absolute;
            width: 25px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FF8C00);
            border-radius: 50%;
            top: -10px;
            transform-origin: bottom center;
        }

        .ear-left {
            left: 30px;
            transform: rotate(-20deg);
            animation: earMove 4s ease-in-out infinite;
        }

        .ear-right {
            right: 30px;
            transform: rotate(20deg);
            animation: earMove 4s ease-in-out infinite 0.5s;
        }

        @keyframes earMove {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(-15deg); }
        }

        /* 尾巴 */
        .pet-tail {
            position: absolute;
            width: 30px;
            height: 10px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FF8C00);
            border-radius: 5px;
            bottom: 30px;
            right: 10px;
            transform-origin: left center;
            animation: tailWag 3s ease-in-out infinite;
        }

        @keyframes tailWag {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(20deg); }
        }

        /* 心情指示器 */
        .mood-indicator {
            background: rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            margin-top: 10px;
        }

        .mood-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        /* 饱食度条 */
        .progress-container {
            display: flex;
            align-items: center;
            padding: 0 20px 20px;
            z-index: 5;
            position: relative;
        }

        .progress-label {
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 60px;
        }

        .progress-bar {
            flex: 1;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 10px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 50%; /* 示例饱食度 */
            background: linear-gradient(90deg, #4ECDC4, #44A08D);
            border-radius: 10px;
            transition: width 0.5s ease, background 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            100% { left: 100%; }
        }

        .progress-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 40px;
            text-align: right;
        }

        /* 操作提示 */
        .instructions {
            text-align: center;
            padding: 0 20px 20px;
            z-index: 5;
            position: relative;
        }

        .instruction-text {
            color: white;
            font-size: 14px;
            opacity: 0.8;
        }

        /* 底部导航 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.1);
            z-index: 10;
            position: relative;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* 心情颜色类 */
        .container.happy { 
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); /* 金色 - 开心 */
        }
        .container.neutral { 
            background: linear-gradient(135deg, #FFA500 0%, #FF8C00 100%); /* 橙色 - 一般 */
        }
        .container.sad { 
            background: linear-gradient(135deg, #1E90FF 0%, #4169E1 100%); /* 蓝色 - 难过 */
        }

        /* 点击动画 */
        .pet-clicked {
            animation: petClicked 0.3s ease;
        }

        @keyframes petClicked {
            0% { transform: scale3d(1, 1, 1); }
            50% { transform: scale3d(1.1, 1.05, 1.1); }
            100% { transform: scale3d(1, 1, 1); }
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            animation: particleFloat 1s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }
            
            .pet-3d-container {
                width: 180px;
                height: 180px;
            }
            
            .pet-body {
                width: 130px;
                height: 130px;
                left: 25px;
                top: 25px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景特效 -->
    <div class="background-effects" id="backgroundEffects"></div>
    
    <div class="container neutral" id="mainContainer">
        <!-- 头部导航 -->
        <div class="header">
            <button class="nav-button" onclick="goToChat()">💬</button>
            <div class="coins-container">
                💰
                <span class="coins-text" id="coinsDisplay">50</span>
            </div>
            <button class="nav-button" onclick="goToShop()">🛒</button>
        </div>

        <!-- 宠物区域 -->
        <div class="pet-area">
            <div class="pet-container">
                <div class="pet-3d-container" id="pet3dContainer" onclick="petClick()" onmousedown="startInteraction(event)" ontouchstart="startInteraction(event)">
                    <div class="pet-3d" id="pet3d">
                        <div class="pet-body" id="petBody">
                            <div class="pet-face">
                                <div class="pet-eye eye-left" id="eyeLeft"></div>
                                <div class="pet-eye eye-right" id="eyeRight"></div>
                                <div class="pet-mouth" id="mouth"></div>
                            </div>
                            <div class="pet-ear ear-left" id="earLeft"></div>
                            <div class="pet-ear ear-right" id="earRight"></div>
                            <div class="pet-tail" id="tail"></div>
                        </div>
                    </div>
                </div>
                <div class="mood-indicator">
                    <span class="mood-text" id="moodText">一般</span>
                </div>
            </div>
        </div>

        <!-- 饱食度条 -->
        <div class="progress-container">
            <span class="progress-label">饱食度</span>
            <div class="progress-bar">
                <div class="progress-fill" id="hungerBar"></div>
            </div>
            <span class="progress-text" id="hungerPercent">50%</span>
        </div>

        <!-- 操作提示 -->
        <div class="instructions">
            <p class="instruction-text">点击宠物 +1金币 | 长按喂食</p>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>主页</span>
            </a>
            <a href="shop.html" class="nav-item">
                <span class="nav-icon">🛒</span>
                <span>商店</span>
            </a>
            <a href="chat.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span>对话</span>
            </a>
        </div>
    </div>

    <script>
        // 宠物数据
        let coins = 50;
        let hunger = 50; // 0-100
        let mood = 'neutral'; // happy, neutral, sad
        let isInteracting = false;
        let interactionTimer = null;
        let particles = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            createBackgroundEffects();
            updateHungerDisplay();
            
            // 添加鼠标移动事件来增加3D效果
            document.addEventListener('mousemove', function(e) {
                if (!isInteracting) {
                    const pet3d = document.getElementById('pet3d');
                    const rect = pet3d.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    const rotateY = (e.clientX - centerX) / 20;
                    const rotateX = (centerY - e.clientY) / 20;
                    
                    pet3d.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                }
            });
        });

        // 创建背景特效
        function createBackgroundEffects() {
            const container = document.getElementById('backgroundEffects');
            for (let i = 0; i < 20; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                // 随机大小和位置
                const size = Math.random() * 40 + 10;
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const delay = Math.random() * 6;
                
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = left + '%';
                bubble.style.top = top + '%';
                bubble.style.animationDelay = delay + 's';
                
                container.appendChild(bubble);
            }
        }

        // 宠物点击事件
        function petClick() {
            // 增加金币
            coins += 1;
            document.getElementById('coinsDisplay').textContent = coins;
            
            // 创建粒子效果
            createParticles();
            
            // 添加点击动画
            const pet3d = document.getElementById('pet3d');
            pet3d.classList.add('pet-clicked');
            setTimeout(() => {
                pet3d.classList.remove('pet-clicked');
            }, 300);
            
            // 宠物表情变化
            const mouth = document.getElementById('mouth');
            const originalStyle = mouth.style.borderRadius;
            mouth.style.borderRadius = '15px 15px 15px 15px'; // 瞬间开心
            setTimeout(() => {
                mouth.style.borderRadius = originalStyle;
            }, 300);
            
            // 更新心情
            updateMoodBasedOnHunger();
        }

        // 开始交互（点击或长按）
        function startInteraction(event) {
            isInteracting = true;
            
            // 开始喂食计时器
            interactionTimer = setTimeout(function() {
                feedPet();
            }, 1000); // 长按1秒后喂食
        }

        // 停止交互
        function stopInteraction(event) {
            isInteracting = false;
            
            if (interactionTimer) {
                clearTimeout(interactionTimer);
                interactionTimer = null;
            }
        }

        // 喂食宠物
        function feedPet() {
            if (hunger > 0) {
                hunger = Math.max(0, hunger - 20);
                updateHungerDisplay();
                
                // 创建绿色粒子效果（食物）
                createParticles('#4CAF50');
                
                // 宠物反应
                const pet3d = document.getElementById('pet3d');
                pet3d.style.animation = 'none';
                setTimeout(() => {
                    pet3d.style.animation = 'breathe3d 3s ease-in-out infinite';
                }, 10);
                
                alert('宠物吃饱了！');
            } else {
                alert('宠物已经很饱了！');
            }
        }

        // 更新饱食度显示
        function updateHungerDisplay() {
            const hungerBar = document.getElementById('hungerBar');
            const hungerPercent = document.getElementById('hungerPercent');
            const moodText = document.getElementById('moodText');
            const mainContainer = document.getElementById('mainContainer');
            const petBody = document.getElementById('petBody');
            
            hungerBar.style.width = (100 - hunger) + '%';
            hungerPercent.textContent = (100 - hunger) + '%';
            
            // 根据饱食度更新心情
            if (hunger <= 30) {
                mood = 'happy';
                moodText.textContent = '开心';
                
                // 开心时的宠物外观
                petBody.style.background = 'radial-gradient(circle at 30% 30%, #FFD700, #FFA500, #FF8C00)';
                document.getElementById('mainContainer').className = 'container happy';
                
                // 更快的动画
                petBody.style.animation = 'breathe3d 2s ease-in-out infinite';
            } else if (hunger <= 70) {
                mood = 'neutral';
                moodText.textContent = '一般';
                
                // 一般时的宠物外观
                petBody.style.background = 'radial-gradient(circle at 30% 30%, #FFA500, #FF8C00, #FF6B35)';
                document.getElementById('mainContainer').className = 'container neutral';
                
                // 标准动画
                petBody.style.animation = 'breathe3d 3s ease-in-out infinite';
            } else {
                mood = 'sad';
                moodText.textContent = '难过';
                
                // 难过时的宠物外观
                petBody.style.background = 'radial-gradient(circle at 30% 30%, #1E90FF, #4169E1, #00008B)';
                document.getElementById('mainContainer').className = 'container sad';
                
                // 更慢的动画
                petBody.style.animation = 'breathe3d 4s ease-in-out infinite';
            }
        }

        // 创建粒子效果
        function createParticles(color = '#FFD700') {
            const petRect = document.getElementById('pet3dContainer').getBoundingClientRect();
            const centerX = petRect.left + petRect.width / 2;
            const centerY = petRect.top + petRect.height / 2;
            
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.backgroundColor = color;
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                
                // 随机方向和距离
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 50 + 30;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(particle);
                
                // 移除粒子
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        // 根据饱食度更新心情
        function updateMoodBasedOnHunger() {
            if (hunger <= 30) {
                mood = 'happy';
                document.getElementById('moodText').textContent = '开心';
                document.getElementById('mainContainer').className = 'container happy';
            } else if (hunger <= 70) {
                mood = 'neutral';
                document.getElementById('moodText').textContent = '一般';
                document.getElementById('mainContainer').className = 'container neutral';
            } else {
                mood = 'sad';
                document.getElementById('moodText').textContent = '难过';
                document.getElementById('mainContainer').className = 'container sad';
            }
        }

        // 导航功能
        function goToShop() {
            window.location.href = 'shop.html';
        }

        function goToChat() {
            window.location.href = 'chat.html';
        }

        // 添加鼠标事件监听器
        document.addEventListener('mouseup', stopInteraction);
        document.addEventListener('mouseleave', stopInteraction);
        document.addEventListener('touchend', function(e) {
            stopInteraction(e);
        });
    </script>
</body>
</html>
